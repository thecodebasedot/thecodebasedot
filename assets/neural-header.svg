<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="The Codebase - AI Systems Engineering">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F1C"/>
      <stop offset="0.5" stop-color="#0D1B2A"/>
      <stop offset="1" stop-color="#071019"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7FE3FF"/>
      <stop offset="0.5" stop-color="#2C9CF0"/>
      <stop offset="1" stop-color="#5B8DEF"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0D1B2A" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0D1B2A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tglow" x="-30%" y="-40%" width="160%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes nodePulse { 0%,100%{opacity:.5} 50%{opacity:1} }
      @keyframes linkPulse { 0%,100%{stroke-opacity:.08} 50%{stroke-opacity:.42} }
      @keyframes titleFade { 0%{opacity:0;transform:translateY(6px)} 100%{opacity:1;transform:translateY(0)} }
      @keyframes subFade   { 0%{opacity:0} 100%{opacity:.85} }
      @keyframes underline  { 0%{width:0;opacity:0} 100%{width:250px;opacity:1} }
      .links line { stroke:#2C9CF0; stroke-width:1; stroke-opacity:.10; animation:linkPulse 4.5s ease-in-out infinite; }
      .links line:nth-child(2n){ animation-duration:5.5s; animation-delay:.5s; }
      .links line:nth-child(3n){ animation-duration:3.6s; animation-delay:1s; stroke:#4FD1FF; }
      .links line:nth-child(5n){ animation-duration:6.2s; animation-delay:1.7s; }
      .links line:nth-child(7n){ animation-delay:2.3s; }
      .nodes circle { fill:#4FD1FF; filter:url(#glow); animation:nodePulse 3s ease-in-out infinite; }
      .nodes circle:nth-child(2n){ animation-delay:.4s; animation-duration:3.7s; fill:#7FE3FF; }
      .nodes circle:nth-child(3n){ animation-delay:.9s; animation-duration:2.6s; }
      .nodes circle:nth-child(5n){ animation-delay:1.5s; fill:#5B8DEF; }
      .brand { animation: titleFade 1.1s ease-out both; }
      .sub   { animation: subFade 1.4s ease-out .5s both; }
      .rule  { animation: underline 1.2s ease-out .4s both; }
    </style>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#bg)" opacity="0"/>

  <!-- connections -->
  <g class="links">
    <line x1="110" y1="90" x2="290" y2="70"/><line x1="110" y1="90" x2="290" y2="130"/><line x1="110" y1="90" x2="290" y2="190"/><line x1="110" y1="90" x2="290" y2="250"/>
    <line x1="110" y1="150" x2="290" y2="70"/><line x1="110" y1="150" x2="290" y2="130"/><line x1="110" y1="150" x2="290" y2="190"/><line x1="110" y1="150" x2="290" y2="250"/>
    <line x1="110" y1="210" x2="290" y2="70"/><line x1="110" y1="210" x2="290" y2="130"/><line x1="110" y1="210" x2="290" y2="190"/><line x1="110" y1="210" x2="290" y2="250"/>
    <line x1="290" y1="70" x2="470" y2="90"/><line x1="290" y1="70" x2="470" y2="150"/><line x1="290" y1="70" x2="470" y2="210"/>
    <line x1="290" y1="130" x2="470" y2="90"/><line x1="290" y1="130" x2="470" y2="150"/><line x1="290" y1="130" x2="470" y2="210"/>
    <line x1="290" y1="190" x2="470" y2="90"/><line x1="290" y1="190" x2="470" y2="150"/><line x1="290" y1="190" x2="470" y2="210"/>
    <line x1="290" y1="250" x2="470" y2="90"/><line x1="290" y1="250" x2="470" y2="150"/><line x1="290" y1="250" x2="470" y2="210"/>
    <line x1="470" y1="90" x2="730" y2="90" stroke-opacity="0.05"/><line x1="470" y1="150" x2="730" y2="150" stroke-opacity="0.05"/><line x1="470" y1="210" x2="730" y2="210" stroke-opacity="0.05"/>
    <line x1="730" y1="90" x2="910" y2="70"/><line x1="730" y1="90" x2="910" y2="130"/><line x1="730" y1="90" x2="910" y2="190"/><line x1="730" y1="90" x2="910" y2="250"/>
    <line x1="730" y1="150" x2="910" y2="70"/><line x1="730" y1="150" x2="910" y2="130"/><line x1="730" y1="150" x2="910" y2="190"/><line x1="730" y1="150" x2="910" y2="250"/>
    <line x1="730" y1="210" x2="910" y2="70"/><line x1="730" y1="210" x2="910" y2="130"/><line x1="730" y1="210" x2="910" y2="190"/><line x1="730" y1="210" x2="910" y2="250"/>
    <line x1="910" y1="70" x2="1090" y2="90"/><line x1="910" y1="70" x2="1090" y2="150"/><line x1="910" y1="70" x2="1090" y2="210"/>
    <line x1="910" y1="130" x2="1090" y2="90"/><line x1="910" y1="130" x2="1090" y2="150"/><line x1="910" y1="130" x2="1090" y2="210"/>
    <line x1="910" y1="190" x2="1090" y2="90"/><line x1="910" y1="190" x2="1090" y2="150"/><line x1="910" y1="190" x2="1090" y2="210"/>
    <line x1="910" y1="250" x2="1090" y2="90"/><line x1="910" y1="250" x2="1090" y2="150"/><line x1="910" y1="250" x2="1090" y2="210"/>
  </g>

  <!-- traveling signals -->
  <g fill="#8FEBFF">
    <circle cx="0" cy="0" r="2.6"><animateMotion dur="2.6s" repeatCount="indefinite" path="M110,150 L290,130"/></circle>
    <circle cx="0" cy="0" r="2.6"><animateMotion dur="2.6s" begin="0.6s" repeatCount="indefinite" path="M290,130 L470,150"/></circle>
    <circle cx="0" cy="0" r="2.6"><animateMotion dur="3.1s" begin="0.3s" repeatCount="indefinite" path="M110,90 L290,190"/></circle>
    <circle cx="0" cy="0" r="2.6"><animateMotion dur="2.9s" begin="1.1s" repeatCount="indefinite" path="M290,250 L470,210"/></circle>
    <circle cx="0" cy="0" r="2.6"><animateMotion dur="2.7s" begin="0.2s" repeatCount="indefinite" path="M730,150 L910,130"/></circle>
    <circle cx="0" cy="0" r="2.6"><animateMotion dur="2.7s" begin="0.9s" repeatCount="indefinite" path="M910,130 L1090,150"/></circle>
    <circle cx="0" cy="0" r="2.6"><animateMotion dur="3.2s" begin="0.5s" repeatCount="indefinite" path="M730,90 L910,250"/></circle>
    <circle cx="0" cy="0" r="2.6"><animateMotion dur="3.0s" begin="1.4s" repeatCount="indefinite" path="M910,190 L1090,90"/></circle>
  </g>

  <!-- nodes -->
  <g class="nodes">
    <circle cx="110" cy="90" r="5"/><circle cx="110" cy="150" r="5"/><circle cx="110" cy="210" r="5"/>
    <circle cx="290" cy="70" r="5"/><circle cx="290" cy="130" r="5"/><circle cx="290" cy="190" r="5"/><circle cx="290" cy="250" r="5"/>
    <circle cx="470" cy="90" r="5"/><circle cx="470" cy="150" r="5"/><circle cx="470" cy="210" r="5"/>
    <circle cx="730" cy="90" r="5"/><circle cx="730" cy="150" r="5"/><circle cx="730" cy="210" r="5"/>
    <circle cx="910" cy="70" r="5"/><circle cx="910" cy="130" r="5"/><circle cx="910" cy="190" r="5"/><circle cx="910" cy="250" r="5"/>
    <circle cx="1090" cy="90" r="5"/><circle cx="1090" cy="150" r="5"/><circle cx="1090" cy="210" r="5"/>
  </g>

  <!-- center title -->
  <rect x="410" y="70" width="380" height="160" fill="url(#core)"/>
  <g text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text class="brand" x="600" y="145" font-size="52" font-weight="700" fill="url(#title)" filter="url(#tglow)" letter-spacing="1">The Codebase</text>
    <rect class="rule" x="475" y="162" height="2" rx="1" fill="#2C9CF0"/>
    <text class="sub" x="600" y="192" font-size="15" font-weight="500" fill="#9FB6D6" font-family="'Fira Code','Courier New',monospace" letter-spacing="2">AI · DATA · SECURITY ENGINEERING</text>
  </g>
</svg>
